<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢 迎 光 临</title>
    <!-- Tesseract.js 和 html5-qrcode 库 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            background-color: #050510;
        }

        /* Canvas 背景层 - 粒子系统 */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        /* 主内容区 - 玻璃卡片 */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2.5rem 3rem;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(100, 150, 255, 0.2);
            border: 1px solid rgba(80, 180, 255, 0.3);
            animation: floatGlow 6s ease-in-out infinite;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(100, 200, 255, 0.5);
        }

        .neon-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, #aaffff, #3a86ff, #c084fc, #f472b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 8s ease infinite, textGlitch 3s infinite;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.2rem;
            color: rgba(220, 240, 255, 0.9);
            background: linear-gradient(120deg, rgba(100, 200, 255, 0.4), rgba(255, 255, 255, 0.1));
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            margin-top: 1rem;
            border: 1px solid rgba(100, 200, 255, 0.3);
        }

        .tech-tag {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            font-family: 'Fira Code', monospace;
            color: #88ccff;
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            border-left: 3px solid cyan;
        }

        /* 动画定义 */
        @keyframes floatGlow {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes textGlitch {
            0%,100% { text-shadow: 0 0 5px cyan; }
            96% { text-shadow: -2px 0 red, 2px 0 blue; }
            97% { text-shadow: 2px 0 red, -2px 0 blue; }
        }

        /* ========= 互动菜单面板 (右侧悬浮) ========= */
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(10, 20, 35, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 1rem 1.2rem;
            width: 260px;
            border: 1px solid rgba(100, 180, 255, 0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
            font-size: 0.85rem;
            pointer-events: auto;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 6px;
            cursor: pointer;
        }
        .panel-header h3 {
            font-size: 1rem;
            font-weight: 500;
            color: #ccf;
            letter-spacing: 1px;
        }
        .toggle-icon {
            font-size: 1.2rem;
            color: #8af;
            transition: transform 0.2s;
        }
        .panel-content {
            max-height: 380px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }
        .panel-content.collapsed {
            max-height: 0;
            overflow: hidden;
        }
        .panel-content::-webkit-scrollbar {
            width: 4px;
        }
        .panel-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .panel-content::-webkit-scrollbar-thumb {
            background: #6af;
            border-radius: 4px;
        }

        .ctrl-group {
            margin-bottom: 18px;
        }
        .ctrl-group label {
            display: block;
            font-size: 0.75rem;
            color: #ffec99;
            text-shadow: 0 0 4px #ffec99;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .theme-buttons, .mode-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .theme-btn, .mode-btn {
            background: rgba(30, 40, 60, 0.7);
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #eef;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .theme-btn:hover, .mode-btn:hover {
            background: rgba(100, 150, 255, 0.5);
            transform: scale(1.02);
        }
        .theme-btn.active, .mode-btn.active {
            background: #3a86ff;
            border-color: white;
            box-shadow: 0 0 8px #3a86ff;
        }

        /* 预留功能区域 */
        .future-section {
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px dashed rgba(255,255,255,0.2);
        }
        /* 让“智能扩展”标题变得明亮醒目 */
        .future-section label {
            display: block;
            font-size: 0.75rem;
            color: #ffec99;
            text-shadow: 0 0 6px #ffaa33;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .future-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .future-btn {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(200,180,100,0.6);
            color: #ffd966;
            padding: 8px 0;
            border-radius: 28px;
            font-size: 0.7rem;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .future-btn:hover {
            background: rgba(255,200,100,0.2);
            border-color: #ffb347;
            color: #ffeaac;
            transform: translateY(-2px);
        }
        .info-note {
            font-size: 0.65rem;
            color: #cceeff;      /* 原 #aac 太暗，改为亮蓝白 */
            margin-top: 10px;
            text-align: center;
        }

        /* ========= 二维码扫描模态框 ========= */
        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .qr-modal.active {
            display: flex;
        }
        .qr-container {
            background: rgba(20, 30, 50, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            width: 90%;
            max-width: 500px;
            padding: 1.5rem;
            border: 1px solid rgba(100,200,255,0.5);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            color: white;
            font-family: monospace;
        }
        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 0.5rem;
        }
        .qr-header h3 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #aaffff, #6a6aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            color: #ffaa88;
        }
        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #ccd;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: rgba(100,150,255,0.4);
            color: white;
            box-shadow: 0 0 5px cyan;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .file-input-label {
            display: block;
            background: rgba(50,80,120,0.6);
            padding: 12px;
            text-align: center;
            border-radius: 2rem;
            cursor: pointer;
            margin-bottom: 15px;
            border: 1px dashed #8af;
        }
        #qr-file-input {
            display: none;
        }
        .camera-box {
            width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            background: #000;
            margin-bottom: 12px;
        }
        #qr-camera-reader {
            width: 100%;
            min-height: 280px;
        }
        .qr-result {
            margin-top: 15px;
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 1rem;
            word-break: break-all;
            font-size: 0.8rem;
            color: #aef;
            border-left: 4px solid #3a86ff;
        }
        .start-camera-btn, .stop-camera-btn {
            background: rgba(58,134,255,0.7);
            border: none;
            padding: 8px 16px;
            border-radius: 2rem;
            color: white;
            margin-top: 8px;
            margin-right: 8px;
            cursor: pointer;
        }
        /* OCR 样式 */
        .ocr-url-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .ocr-url-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(100,200,255,0.4);
            border-radius: 2rem;
            padding: 10px 15px;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }
        .ocr-url-btn {
            background: rgba(58,134,255,0.7);
            border: none;
            border-radius: 2rem;
            padding: 0 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .ocr-url-btn:hover {
            background: rgba(58,134,255,1);
        }
        .ocr-progress {
            margin: 10px 0;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        .ocr-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3a86ff, #c084fc);
            transition: width 0.3s;
        }
        .ocr-result-text {
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        @media (max-width: 640px) {
            .control-panel { width: 240px; right: 12px; top: 12px; padding: 0.8rem; }
            .neon-title { font-size: 2.2rem; }
            .glass-card { padding: 1.5rem; }
            .qr-container { width: 95%; padding: 1rem; }
        }
        .version-tip {
            position: fixed;
            bottom: 12px;
            left: 16px;
            z-index: 100;
            font-size: 10px;
            color: rgba(150,180,255,0.5);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 20px;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="content">
        <div class="glass-card">
            <div class="neon-title">✦ 灵境 ✦</div>
            <div class="sub">// 粒子 · 可控幻域</div>
            <div class="tech-tag">⚡ 实时互动</div>
        </div>
    </div>

    <!-- 互动菜单 -->
    <div class="control-panel" id="controlPanel">
        <div class="panel-header" id="panelHeader">
            <h3>🌀 控制中枢</h3>
            <span class="toggle-icon" id="togglePanel">▼</span>
        </div>
        <div class="panel-content" id="panelContent">
            <div class="ctrl-group">
                <label>🎨 色彩主题</label>
                <div class="theme-buttons">
                    <button data-theme="neonPurple" class="theme-btn active">霓虹幻紫</button>
                    <button data-theme="auroraGreen" class="theme-btn">极光青绿</button>
                    <button data-theme="emberOrange" class="theme-btn">烈焰橙红</button>
                </div>
            </div>
            <div class="ctrl-group">
                <label>✨ 粒子动力场</label>
                <div class="mode-buttons">
                    <button data-mode="attract" class="mode-btn active">引力追随</button>
                    <button data-mode="vortex" class="mode-btn">旋涡风暴</button>
                    <button data-mode="repel" class="mode-btn">排斥领域</button>
                </div>
            </div>

            <div class="future-section">
                <label>🔮 智能扩展</label>
                <div class="future-buttons">
                    <div class="future-btn" id="qrLiveBtn">📱 二维码扫描</div>
                    <div class="future-btn" id="ocrBtn">📷 图片识别文字</div>
                </div>
                <div class="info-note">✨ 本地识别 保证安全</div>
            </div>
        </div>
    </div>
    <div class="version-tip">⚙️ 动态扩展 | 离开本页标题会立刻变化～</div>

    <!-- 二维码扫描模态框 -->
    <div id="qrModal" class="qr-modal">
        <div class="qr-container">
            <div class="qr-header">
                <h3>🔍 二维码扫描</h3>
                <span class="close-modal" id="closeQrModal">&times;</span>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="file">📁 上传图片</button>
                <button class="tab-btn" data-tab="camera">📷 实时摄像头</button>
            </div>
            <div class="tab-pane active" id="fileTab">
                <label class="file-input-label">
                    📂 点击选择二维码图片
                    <input type="file" id="qr-file-input" accept="image/*">
                </label>
                <div id="file-result" class="qr-result">等待识别...</div>
            </div>
            <div class="tab-pane" id="cameraTab">
                <div class="camera-box">
                    <div id="qr-camera-reader"></div>
                </div>
                <div>
                    <button id="startCameraBtn" class="start-camera-btn">📸 启动摄像头</button>
                    <button id="stopCameraBtn" class="stop-camera-btn" style="display:none;">⏹️ 停止扫描</button>
                </div>
                <div id="camera-result" class="qr-result">等待扫描...</div>
            </div>
        </div>
    </div>

    <!-- OCR 模态框 (新增) -->
    <div id="ocrModal" class="qr-modal">
        <div class="qr-container">
            <div class="qr-header">
                <h3>📖 图片文字识别 (OCR)</h3>
                <span class="close-modal" id="closeOcrModal">&times;</span>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" data-ocr-tab="upload">📤 上传图片</button>
                <button class="tab-btn" data-ocr-tab="url">🔗 图片链接</button>
            </div>
            <!-- 上传图片 Tab -->
            <div class="tab-pane active" id="ocrUploadTab">
                <label class="file-input-label">
                    📂 点击选择图片 (支持中文/英文识别)
                    <input type="file" id="ocr-file-input" accept="image/*">
                </label>
                <div class="ocr-progress" id="ocrProgress">
                    <div class="ocr-progress-bar" id="ocrProgressBar"></div>
                </div>
                <div id="ocr-result" class="qr-result">
                    <div style="color:#8af; margin-bottom:8px;">📝 识别结果</div>
                    <div id="ocr-result-text" class="ocr-result-text">等待识别...</div>
                </div>
            </div>
            <!-- 图片链接 Tab -->
            <div class="tab-pane" id="ocrUrlTab">
                <div class="ocr-url-input-group">
                    <input type="text" id="ocr-url-input" class="ocr-url-input" placeholder="输入图片URL地址...">
                    <button id="ocr-url-btn" class="ocr-url-btn">识别</button>
                </div>
                <div class="ocr-progress" id="ocrUrlProgress">
                    <div class="ocr-progress-bar" id="ocrUrlProgressBar"></div>
                </div>
                <div id="ocr-url-result" class="qr-result">
                    <div style="color:#8af; margin-bottom:8px;">📝 识别结果</div>
                    <div id="ocr-url-text" class="ocr-result-text">等待识别...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            // ================= 1. 页面失焦立即改变标题 =================
            const originalTitle = document.title;
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    document.title = '😢 你已经离开了，快回来吧！';
                } else {
                    document.title = originalTitle;
                }
            });

            // ================= 2. 原有粒子系统 =================
            const canvas = document.getElementById('canvas-bg');
            let ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            let particles = [];
            const BASE_PARTICLE_COUNT = 160;
            let mouseX = width/2, mouseY = height/2;
            let mousePresent = false;
            let currentTheme = 'neonPurple';
            let currentMode = 'attract';

            const themeConfig = {
                neonPurple: { hueMin: 210, hueMax: 330, bgStart: '#0a0a2a', bgMid: '#12103a', bgEnd: '#020014', glowHue: 260, cardBorder: 'rgba(100, 150, 255, 0.5)' },
                auroraGreen: { hueMin: 140, hueMax: 210, bgStart: '#0a2218', bgMid: '#0c2a1e', bgEnd: '#021008', glowHue: 170, cardBorder: 'rgba(80, 220, 150, 0.6)' },
                emberOrange: { hueMin: 20, hueMax: 70, bgStart: '#2a1508', bgMid: '#3a1e0c', bgEnd: '#1a0a02', glowHue: 40, cardBorder: 'rgba(255, 140, 50, 0.6)' }
            };

            function randomRange(min, max) { return min + Math.random() * (max - min); }

            class Particle {
                constructor(x,y,vx,vy,radius,baseHue,sat,light){
                    this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.radius=radius; this.baseHue=baseHue;
                    this.sat=sat||(70+Math.random()*25); this.light=light||(55+Math.random()*30);
                    this.alpha=0.7+Math.random()*0.3; this.phase=Math.random()*Math.PI*2; this.currentRadius=radius;
                }
                update(){
                    this.x+=this.vx; this.y+=this.vy;
                    const r=this.radius;
                    if(this.x-r<0){ this.x=r; this.vx=-this.vx*0.96; }
                    if(this.x+r>width){ this.x=width-r; this.vx=-this.vx*0.96; }
                    if(this.y-r<0){ this.y=r; this.vy=-this.vy*0.96; }
                    if(this.y+r>height){ this.y=height-r; this.vy=-this.vy*0.96; }
                    if(Math.random()<0.02){
                        this.vx+=(Math.random()-0.5)*0.15; this.vy+=(Math.random()-0.5)*0.15;
                        let maxSp=2.4;
                        if(Math.abs(this.vx)>maxSp) this.vx=this.vx>0?maxSp:-maxSp;
                        if(Math.abs(this.vy)>maxSp) this.vy=this.vy>0?maxSp:-maxSp;
                    }
                    this.phase+=0.025;
                    let pulse=Math.sin(this.phase)*0.35;
                    this.currentRadius=Math.max(1.8, this.radius+pulse);
                }
                draw(ctx){
                    let hue=this.baseHue + (this.vx*2.5+this.vy*1.8);
                    hue = ((hue%360)+360)%360;
                    const grad=ctx.createRadialGradient(this.x,this.y,1,this.x,this.y,this.currentRadius*1.3);
                    grad.addColorStop(0,`hsla(${hue},${this.sat}%,${this.light}%,${this.alpha})`);
                    grad.addColorStop(1,`hsla(${hue},${this.sat}%,${this.light-20}%,${this.alpha*0.5})`);
                    ctx.beginPath(); ctx.arc(this.x,this.y,this.currentRadius,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
                    ctx.beginPath(); ctx.arc(this.x,this.y,this.currentRadius*0.5,0,Math.PI*2);
                    ctx.fillStyle=`hsla(${hue},85%,70%,0.3)`; ctx.fill();
                }
            }

            function initParticles(){
                const cfg=themeConfig[currentTheme];
                const hueMin=cfg.hueMin, hueMax=cfg.hueMax;
                particles=[];
                for(let i=0;i<BASE_PARTICLE_COUNT;i++){
                    let rad=randomRange(2.2,6);
                    let x=randomRange(rad,width-rad), y=randomRange(rad,height-rad);
                    let vx=randomRange(-0.7,0.7), vy=randomRange(-0.7,0.7);
                    let baseHue=randomRange(hueMin,hueMax);
                    particles.push(new Particle(x,y,vx,vy,rad,baseHue));
                }
            }
            function applyDynamicForces(){
                if(!mousePresent && currentMode!=='vortex') return;
                const mouseForceRadius=130;
                for(let p of particles){
                    if(currentMode==='vortex'){
                        const cx=width/2, cy=height/2;
                        let dxc=cx-p.x, dyc=cy-p.y;
                        let distC=Math.hypot(dxc,dyc);
                        if(distC>5){
                            let angle=Math.atan2(dyc,dxc);
                            let perpX=-Math.sin(angle), perpY=Math.cos(angle);
                            let forceMag=0.08*(1-Math.min(1,distC/400));
                            p.vx+=perpX*forceMag; p.vy+=perpY*forceMag;
                        }
                    }
                    else if(currentMode==='repel' && mousePresent){
                        let dx=mouseX-p.x, dy=mouseY-p.y;
                        let dist=Math.hypot(dx,dy);
                        if(dist<mouseForceRadius && dist>1){
                            let force=(1-dist/mouseForceRadius)*0.22;
                            let angle=Math.atan2(dy,dx);
                            p.vx-=Math.cos(angle)*force; p.vy-=Math.sin(angle)*force;
                        }
                    }
                    else if(currentMode==='attract' && mousePresent){
                        let dx=mouseX-p.x, dy=mouseY-p.y;
                        let dist=Math.hypot(dx,dy);
                        if(dist<mouseForceRadius && dist>1){
                            let force=(1-dist/mouseForceRadius)*0.14;
                            let angle=Math.atan2(dy,dx);
                            p.vx+=Math.cos(angle)*force; p.vy+=Math.sin(angle)*force;
                        }
                    }
                    let maxV=3.2;
                    if(Math.abs(p.vx)>maxV) p.vx=p.vx>0?maxV:-maxV;
                    if(Math.abs(p.vy)>maxV) p.vy=p.vy>0?maxV:-maxV;
                }
            }
            function drawConnections(){
                let maxDist=135;
                for(let i=0;i<particles.length;i++){
                    for(let j=i+1;j<particles.length;j++){
                        const p1=particles[i], p2=particles[j];
                        const dist=Math.hypot(p1.x-p2.x, p1.y-p2.y);
                        if(dist<maxDist){
                            let opacity=(1-dist/maxDist)*0.45;
                            let avgHue=(p1.baseHue+p2.baseHue)/2;
                            ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
                            ctx.lineWidth=1.2; ctx.strokeStyle=`hsla(${avgHue},75%,65%,${opacity*0.8})`; ctx.stroke();
                            ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
                            ctx.lineWidth=0.6; ctx.strokeStyle=`hsla(${avgHue+30},80%,70%,${opacity*0.5})`; ctx.stroke();
                        }
                    }
                }
            }
            function drawBackgroundGlow(){
                const cfg=themeConfig[currentTheme];
                const grad=ctx.createLinearGradient(0,0,width,height);
                grad.addColorStop(0,cfg.bgStart); grad.addColorStop(0.6,cfg.bgMid); grad.addColorStop(1,cfg.bgEnd);
                ctx.fillStyle=grad; ctx.fillRect(0,0,width,height);
                for(let i=0;i<120;i++) if(Math.random()<0.15){
                    ctx.fillStyle=`rgba(255,240,200,${Math.random()*0.4})`;
                    ctx.beginPath(); ctx.arc(Math.random()*width,Math.random()*height,Math.random()*1.3,0,Math.PI*2); ctx.fill();
                }
            }
            function drawMouseGlow(){
                if(!mousePresent) return;
                let rad=110;
                let grad=ctx.createRadialGradient(mouseX,mouseY,8,mouseX,mouseY,rad);
                grad.addColorStop(0,`hsla(${themeConfig[currentTheme].glowHue},80%,65%,0.25)`);
                grad.addColorStop(1,'rgba(0,0,0,0)');
                ctx.globalCompositeOperation='lighter'; ctx.fillStyle=grad; ctx.fillRect(mouseX-rad,mouseY-rad,rad*2,rad*2);
                ctx.globalCompositeOperation='source-over';
            }
            function animate(){
                if(!ctx) return;
                drawBackgroundGlow();
                ctx.beginPath(); ctx.lineWidth=0.4;
                for(let i=0;i<width;i+=55){ ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.moveTo(0,i); ctx.lineTo(width,i); }
                ctx.strokeStyle=`rgba(100,180,255,0.1)`; ctx.stroke();
                applyDynamicForces();
                for(let p of particles) p.update();
                drawConnections();
                for(let p of particles) p.draw(ctx);
                drawMouseGlow();
                ctx.globalCompositeOperation='lighter';
                for(let i=0;i<8;i++){
                    let t=Date.now()*0.002;
                    let gx=width/2+Math.sin(t+i)*width*0.2, gy=height/2+Math.cos(t*0.9+i)*height*0.15;
                    let gr=ctx.createRadialGradient(gx,gy,5,gx,gy,70);
                    gr.addColorStop(0,`hsla(${themeConfig[currentTheme].glowHue+i*20},70%,60%,0.08)`);
                    gr.addColorStop(1,'transparent');
                    ctx.fillStyle=gr; ctx.fillRect(0,0,width,height);
                }
                ctx.globalCompositeOperation='source-over';
                requestAnimationFrame(animate);
            }
            function resizeCanvas(){
                width=window.innerWidth; height=window.innerHeight;
                canvas.width=width; canvas.height=height;
                initParticles();
                mouseX=width/2; mouseY=height/2;
            }
            function onMouseMove(e){
                const rect=canvas.getBoundingClientRect();
                let cx=(e.clientX-rect.left)*(canvas.width/rect.width);
                let cy=(e.clientY-rect.top)*(canvas.height/rect.height);
                cx=Math.min(width,Math.max(0,cx)); cy=Math.min(height,Math.max(0,cy));
                mouseX=cx; mouseY=cy; mousePresent=true;
            }
            function onMouseLeave(){ mousePresent=false; }
            function onTouchMove(e){
                e.preventDefault();
                const rect=canvas.getBoundingClientRect();
                const touch=e.touches[0];
                let cx=(touch.clientX-rect.left)*(canvas.width/rect.width);
                let cy=(touch.clientY-rect.top)*(canvas.height/rect.height);
                cx=Math.min(width,Math.max(0,cx)); cy=Math.min(height,Math.max(0,cy));
                mouseX=cx; mouseY=cy; mousePresent=true;
            }
            function onTouchEnd(){ mousePresent=false; }
            
            function setupUI(){
                document.querySelectorAll('.theme-btn').forEach(btn=>{
                    btn.addEventListener('click',()=>{
                        const theme=btn.getAttribute('data-theme');
                        if(theme){ currentTheme=theme;
                            document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
                            btn.classList.add('active');
                            const cfg=themeConfig[currentTheme];
                            document.querySelector('.glass-card').style.borderColor=cfg.cardBorder;
                            document.querySelector('.control-panel').style.borderColor=cfg.cardBorder;
                            initParticles();
                        }
                    });
                });
                document.querySelectorAll('.mode-btn').forEach(btn=>{
                    btn.addEventListener('click',()=>{
                        const mode=btn.getAttribute('data-mode');
                        if(mode) currentMode=mode;
                        document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                const header=document.getElementById('panelHeader');
                const contentDiv=document.getElementById('panelContent');
                const toggleIcon=document.getElementById('togglePanel');
                let collapsed=false;
                header.addEventListener('click',(e)=>{
                    if(e.target.closest('.future-btn')) return;
                    collapsed=!collapsed;
                    if(collapsed){ contentDiv.classList.add('collapsed'); toggleIcon.innerHTML='▲'; }
                    else{ contentDiv.classList.remove('collapsed'); toggleIcon.innerHTML='▼'; }
                });
            }

            // ========= 二维码集成模块 (保持不变) =========
            let cameraScanner = null;
            let cameraActive = false;
            const qrModal = document.getElementById('qrModal');
            const openBtn = document.getElementById('qrLiveBtn');
            const closeBtn = document.getElementById('closeQrModal');
            const fileInput = document.getElementById('qr-file-input');
            const fileResultDiv = document.getElementById('file-result');
            const cameraResultDiv = document.getElementById('camera-result');
            const startCameraBtn = document.getElementById('startCameraBtn');
            const stopCameraBtn = document.getElementById('stopCameraBtn');
            
            const tabBtns = document.querySelectorAll('.tab-btn');
            const fileTab = document.getElementById('fileTab');
            const cameraTab = document.getElementById('cameraTab');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.getAttribute('data-tab');
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if(tab === 'file') {
                        fileTab.classList.add('active');
                        cameraTab.classList.remove('active');
                        if(cameraActive) stopCamera();
                    } else {
                        fileTab.classList.remove('active');
                        cameraTab.classList.add('active');
                    }
                });
            });
            
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                fileResultDiv.innerText = '识别中...';
                try {
                    const result = await Html5Qrcode.scanFile(file, true);
                    fileResultDiv.innerHTML = `✅ 解码结果：<strong>${result}</strong>`;
                } catch(err) {
                    fileResultDiv.innerText = '❌ 未发现二维码或解析失败';
                }
            });
            
            async function startCamera() {
                if(cameraScanner) await stopCamera();
                cameraScanner = new Html5Qrcode("qr-camera-reader");
                try {
                    await cameraScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                        cameraResultDiv.innerHTML = `🎥 实时结果：<strong>${decodedText}</strong>`;
                    }, (err) => {});
                    cameraActive = true;
                    startCameraBtn.style.display = 'none';
                    stopCameraBtn.style.display = 'inline-block';
                    cameraResultDiv.innerText = '摄像头已启动，对准二维码...';
                } catch(err) {
                    cameraResultDiv.innerText = '摄像头启动失败，请检查权限';
                }
            }
            async function stopCamera() {
                if(cameraScanner) {
                    await cameraScanner.stop();
                    cameraScanner.clear();
                    cameraScanner = null;
                }
                cameraActive = false;
                startCameraBtn.style.display = 'inline-block';
                stopCameraBtn.style.display = 'none';
                cameraResultDiv.innerText = '摄像头已停止';
            }
            startCameraBtn.addEventListener('click', startCamera);
            stopCameraBtn.addEventListener('click', stopCamera);
            
            openBtn.addEventListener('click', () => {
                qrModal.classList.add('active');
                document.querySelector('.tab-btn[data-tab="file"]').click();
                if(cameraActive) stopCamera();
            });
            closeBtn.addEventListener('click', () => {
                qrModal.classList.remove('active');
                if(cameraActive) stopCamera();
            });
            qrModal.addEventListener('click', (e) => {
                if(e.target === qrModal) {
                    qrModal.classList.remove('active');
                    if(cameraActive) stopCamera();
                }
            });

            // ================= 3. OCR 图文识别模块 (新增) =================
            const ocrModal = document.getElementById('ocrModal');
            const ocrOpenBtn = document.getElementById('ocrBtn');
            const ocrCloseBtn = document.getElementById('closeOcrModal');
            const ocrFileInput = document.getElementById('ocr-file-input');
            const ocrResultDiv = document.getElementById('ocr-result-text');
            const ocrProgressBar = document.getElementById('ocrProgressBar');
            const ocrProgressWrap = document.getElementById('ocrProgress');
            
            // URL 识别相关元素
            const ocrUrlInput = document.getElementById('ocr-url-input');
            const ocrUrlBtn = document.getElementById('ocr-url-btn');
            const ocrUrlResultDiv = document.getElementById('ocr-url-text');
            const ocrUrlProgressBar = document.getElementById('ocrUrlProgressBar');
            const ocrUrlProgressWrap = document.getElementById('ocrUrlProgress');

            // OCR 选项卡切换
            const ocrTabBtns = document.querySelectorAll('[data-ocr-tab]');
            const ocrUploadTab = document.getElementById('ocrUploadTab');
            const ocrUrlTab = document.getElementById('ocrUrlTab');
            
            ocrTabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.getAttribute('data-ocr-tab');
                    ocrTabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if(tab === 'upload') {
                        ocrUploadTab.classList.add('active');
                        ocrUrlTab.classList.remove('active');
                    } else {
                        ocrUploadTab.classList.remove('active');
                        ocrUrlTab.classList.add('active');
                    }
                });
            });

            // 通用 OCR 识别函数 (中英文混合)
            async function performOCR(imageFileOrBlob, resultElement, progressBarElement, progressWrapElement) {
                if (!imageFileOrBlob) return false;
                // 显示进度条
                if (progressWrapElement) progressWrapElement.style.display = 'block';
                if (progressBarElement) progressBarElement.style.width = '0%';
                resultElement.innerText = '识别中，请稍候...';
                
                try {
                    // 使用 Tesseract.js 识别，支持中英文混合识别
                    const { data: { text } } = await Tesseract.recognize(
                        imageFileOrBlob,
                        'chi_sim+eng',  // 简体中文 + 英文混合识别
                        {
                            logger: (m) => {
                                if (progressBarElement && m.status === 'recognizing text') {
                                    const percent = Math.round(m.progress * 100);
                                    progressBarElement.style.width = `${percent}%`;
                                }
                            }
                        }
                    );
                    if (progressWrapElement) progressWrapElement.style.display = 'none';
                    if (text && text.trim()) {
                        resultElement.innerText = text.trim();
                        return true;
                    } else {
                        resultElement.innerText = '未识别到任何文字，请尝试更清晰的图片';
                        return false;
                    }
                } catch (error) {
                    console.error('OCR识别失败:', error);
                    if (progressWrapElement) progressWrapElement.style.display = 'none';
                    resultElement.innerText = '识别失败，请检查图片格式或重试';
                    return false;
                }
            }

            // 文件上传识别
            ocrFileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                await performOCR(file, ocrResultDiv, ocrProgressBar, ocrProgressWrap);
                ocrFileInput.value = ''; // 清空，允许重复上传同一文件
            });

            // URL 识别
            async function recognizeFromUrl() {
                const url = ocrUrlInput.value.trim();
                if (!url) {
                    ocrUrlResultDiv.innerText = '请输入图片链接';
                    return;
                }
                ocrUrlResultDiv.innerText = '加载图片中...';
                try {
                    // 通过 fetch 获取图片 Blob
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('图片加载失败');
                    const blob = await response.blob();
                    if (!blob.type.startsWith('image/')) {
                        ocrUrlResultDiv.innerText = '链接不是有效的图片格式';
                        return;
                    }
                    await performOCR(blob, ocrUrlResultDiv, ocrUrlProgressBar, ocrUrlProgressWrap);
                } catch (err) {
                    ocrUrlResultDiv.innerText = '图片加载失败，请检查链接是否可访问（注意跨域限制）';
                    if (ocrUrlProgressWrap) ocrUrlProgressWrap.style.display = 'none';
                }
            }

            ocrUrlBtn.addEventListener('click', recognizeFromUrl);
            ocrUrlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') recognizeFromUrl();
            });

            // 打开/关闭 OCR 模态框
            ocrOpenBtn.addEventListener('click', () => {
                ocrModal.classList.add('active');
                // 重置到上传选项卡
                document.querySelector('[data-ocr-tab="upload"]').click();
                // 如果摄像头开着，关闭
                if (cameraActive) stopCamera();
            });
            ocrCloseBtn.addEventListener('click', () => {
                ocrModal.classList.remove('active');
            });
            ocrModal.addEventListener('click', (e) => {
                if (e.target === ocrModal) {
                    ocrModal.classList.remove('active');
                }
            });

            // 启动所有
            function start(){
                resizeCanvas();
                setupUI();
                initParticles();
                window.addEventListener('resize', resizeCanvas);
                canvas.addEventListener('mousemove', onMouseMove);
                canvas.addEventListener('mouseleave', onMouseLeave);
                canvas.addEventListener('touchmove', onTouchMove, {passive: false});
                canvas.addEventListener('touchend', onTouchEnd);
                animate();
            }
            start();
        })();
    </script>
</body>
</html>
